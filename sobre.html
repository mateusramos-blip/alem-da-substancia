    <section id="sobre" class="generic-section" class="page">
        <span class="section-badge">Comentários</span>
        <h2 class="section-title">Deixe seu <em>Depoimento</em></h2>
        <p class="section-subtitle">Compartilhe sua visão, mensagem de apoio ou sugestão sobre o nosso espaço.</p>

        <div class="comments-container">
            <div class="comment-form-box card-with-border">
                <h3>Sua opinião importa</h3>
                <form class="comment-form">
                    <div class="input-group">
                        <label for="comentario-nome">Nome (ou Anônimo)</label>
                        <input type="text" id="comentario-nome" placeholder="Ex: Maria Souza" required>
                    </div>
                    <div class="input-group">
                        <label for="comentario-texto">Seu Comentário</label>
                        <textarea id="comentario-texto" rows="5" placeholder="Escreva aqui o que achou do site ou sua mensagem..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Enviar Depoimento</button>
                </form>
            </div>

            <div class="comments-mural">
                <!-- Os depoimentos vindos do banco de dados serão injetados aqui -->
            </div>
        </div>
    </section>

<script src="script.js">

document.addEventListener("DOMContentLoaded", async () => {

    const form = document.querySelector(".comment-form");

    if (form) {
        form.addEventListener("submit", submitDepoimento);
    }

    updateVisitCounter();
    loadDepoimentos();
});

</script>
